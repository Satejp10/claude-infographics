  /* ---- LIQUID GLASS layers ---- */
  .liquidGlass-wrapper{position:relative;display:flex;font-weight:600;overflow:hidden;color:#000;cursor:grab;
    box-shadow:0 6px 6px rgba(0,0,0,.2),0 0 20px rgba(0,0,0,.1);
    transition:padding .4s cubic-bezier(.175,.885,.32,2.2),margin .4s cubic-bezier(.175,.885,.32,2.2),
      border-radius .4s cubic-bezier(.175,.885,.32,2.2);
    touch-action:none;will-change:transform}
  .liquidGlass-effect{position:absolute;z-index:0;inset:0;backdrop-filter:blur(3px);filter:url(#glass-distortion);overflow:hidden;isolation:isolate}
  .liquidGlass-tint{z-index:1;position:absolute;inset:0;background:rgba(255,255,255,.25)}
  .liquidGlass-shine{position:absolute;inset:0;z-index:2;overflow:hidden;pointer-events:none;
    box-shadow:inset 2px 2px 1px 0 rgba(255,255,255,.5),inset -1px -1px 1px 1px rgba(255,255,255,.5);
    background:radial-gradient(150px circle at var(--mx,-300px) var(--my,-300px),rgba(255,255,255,.30),rgba(255,255,255,0) 65%)}
  .liquidGlass-text{z-index:3;position:relative;color:#000}
  .dragging{cursor:grabbing}

  /* ---- layout ---- */
  .stage{position:relative;z-index:2;display:flex;flex-direction:column;gap:26px;align-items:center}
  .hint{color:#fff;font-size:13px;opacity:.9;text-shadow:0 1px 8px rgba(0,0,0,.6);margin-bottom:2px;
    pointer-events:none;text-align:center;max-width:90vw}

  /* menu — hover grows padding, negative margin keeps layout size constant so siblings never shift */
  .menu{padding:.4rem;border-radius:1.8rem}
  .menu:hover{padding:.55rem;margin:-.15rem}
  .menu .liquidGlass-text{display:flex;flex-direction:column}
  .menu .liquidGlass-text>div{font-size:20px;color:#fff;padding:.4rem .95rem;border-radius:.9rem;
    transition:all .12s ease-in;text-shadow:0 1px 5px rgba(0,0,0,.45)}
  .menu .liquidGlass-text>div:hover{background:rgba(255,255,255,.5);box-shadow:inset -2px -2px 2px rgba(0,0,0,.1);backdrop-filter:blur(2px)}

  /* dock */
  .dock{padding:.55rem;border-radius:2rem}
  .dock:hover{padding:.7rem;margin:-.15rem}
  .dockrow{display:flex;align-items:center;gap:12px;padding:.2rem .4rem}
  .ico{font-size:44px;line-height:1;cursor:pointer;transition:transform .4s cubic-bezier(.175,.885,.32,2.2);
    filter:drop-shadow(0 2px 5px rgba(0,0,0,.4))}
  .ico:hover{transform:scale(1.22) translateY(-9px)}

  /* button */
  .button{padding:1.3rem 2.5rem;border-radius:3rem}
  .button:hover{padding:1.55rem 2.8rem;margin:-.25rem -.3rem}
  .button .liquidGlass-text{font-size:1.5rem;color:#fff;font-weight:600;text-shadow:0 1px 6px rgba(0,0,0,.45);white-space:nowrap}

  /* reset chip */
  .reset{position:absolute;top:14px;right:14px;z-index:4;padding:.55rem 1.05rem;border-radius:2rem;cursor:pointer}
  .reset .liquidGlass-text{font-size:14px;color:#fff;text-shadow:0 1px 5px rgba(0,0,0,.45);white-space:nowrap}
  .reset:hover{padding:.65rem 1.15rem;margin:-.1rem}

  .credit{position:absolute;bottom:12px;left:0;right:0;text-align:center;color:#fff;opacity:.62;font-size:11px;
    text-shadow:0 1px 4px rgba(0,0,0,.6);z-index:3;pointer-events:none}
  .credit a{color:#fff;pointer-events:auto}

  @media(max-width:640px){
    .stage{gap:20px}
    .ico{font-size:36px}
    .menu .liquidGlass-text>div{font-size:18px}
    .button .liquidGlass-text{font-size:1.3rem}
  }
</style>
</head>

      <div>Home</div><div>Work</div><div>Writing</div><div>Contact</div>
    </div>
  </div>

  <div class="liquidGlass-wrapper dock">
    <div class="liquidGlass-effect"></div>
    <div class="liquidGlass-tint"></div>
    <div class="liquidGlass-shine"></div>
    <div class="liquidGlass-text">
      <div class="dockrow">
        <span class="ico">🧭</span><span class="ico">🗂️</span><span class="ico">💬</span>
        <span class="ico">📝</span><span class="ico">🎨</span><span class="ico">⚙️</span>

<div class="credit">Liquid Glass effect by <a href="https://github.com/lucasromerodb/liquid-glass-effect-macos" target="_blank" rel="noopener">lucasromerodb</a> · physics &amp; live light added</div>

<svg style="display:none" id="filterDefs">
  <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
    <feTurbulence type="fractalNoise" baseFrequency="0.01 0.01" numOctaves="1" seed="5" result="turbulence"/>
    <feComponentTransfer in="turbulence" result="mapped">
      <feFuncR type="gamma" amplitude="1" exponent="10" offset="0.5"/>
      <feFuncG type="gamma" amplitude="0" exponent="1" offset="0"/>
      <feFuncB type="gamma" amplitude="0" exponent="1" offset="0.5"/>
    </feComponentTransfer>
    <feGaussianBlur in="turbulence" stdDeviation="3" result="softMap"/>
    <feSpecularLighting in="softMap" surfaceScale="5" specularConstant="1" specularExponent="100" lighting-color="white" result="specLight">
      <fePointLight x="-200" y="-200" z="300"/>
    </feSpecularLighting>
    <!-- template note: in the original, specLight never reached the output (last primitive only used softMap).
         Below, the displaced image is composited WITH the specular light so the point light is actually visible
         and can be driven by the cursor. -->
    <feDisplacementMap in="SourceGraphic" in2="softMap" scale="150" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
    <feComposite in="specLight" in2="displaced" operator="arithmetic" k1="0" k2="0.45" k3="1" k4="0"/>
  </filter>
</svg>

<script>
(function(){
  const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const M = 8; // edge margin
  const baseFilter = document.getElementById('glass-distortion');
  const defs = document.getElementById('filterDefs');
  const panels = [];

  document.querySelectorAll('.liquidGlass-wrapper:not(.no-drag)').forEach((el, i) => {
    // per-panel filter clone so surge + light are independent
    const f = baseFilter.cloneNode(true);
    f.id = 'gd-' + i;
    defs.appendChild(f);
    el.querySelector('.liquidGlass-effect').style.filter = 'url(#gd-' + i + ')';
    const p = {
      el,
      disp: f.querySelector('feDisplacementMap'),
      light: f.querySelector('fePointLight'),
      x:0, y:0, vx:0, vy:0,
      drag:false, px:0, py:0,
      mode:'idle',                 // idle | momentum | spring
      scale:150, scaleT:150,
      lx:-200, ly:-200, ltx:-200, lty:-200,
      wA:0, wT:0,                  // wobble amplitude / time
      base:null
    };
    panels.push(p);

    el.addEventListener('pointerdown', e => {
      p.drag = true; p.mode = 'idle';
      el.classList.add('dragging');
      try { el.setPointerCapture(e.pointerId); } catch(_){}
      p.px = e.clientX; p.py = e.clientY;
      p.vx = 0; p.vy = 0;
      if (!REDUCED) p.scaleT = 230;          // distortion surge while held
    });

    el.addEventListener('pointermove', e => {
      const r = el.getBoundingClientRect();
      p.ltx = e.clientX - r.left; p.lty = e.clientY - r.top;   // filter-space light target
      el.style.setProperty('--mx', (e.clientX - r.left) + 'px'); // CSS sheen fallback
      el.style.setProperty('--my', (e.clientY - r.top) + 'px');
      if (!p.drag) return;
      const dx = e.clientX - p.px, dy = e.clientY - p.py;
      p.px = e.clientX; p.py = e.clientY;
      p.x = clampX(p, p.x + dx);
      p.y = clampY(p, p.y + dy);
      p.vx = p.vx * 0.5 + dx * 0.5;  // smoothed flick velocity
      p.vy = p.vy * 0.5 + dy * 0.5;
    });

    function release(){
      if (!p.drag) return;
      p.drag = false;
      el.classList.remove('dragging');
      p.scaleT = 150;
      if (REDUCED) { p.vx = p.vy = 0; p.mode = 'idle'; }
      else { p.mode = 'momentum'; p.wA = 0.05; p.wT = 0; }   // glide + jelly wobble
    }
    el.addEventListener('pointerup', release);
    el.addEventListener('pointercancel', release);
    el.addEventListener('pointerleave', () => {
      p.ltx = -200; p.lty = -200;
      el.style.setProperty('--mx', '-300px');
      el.style.setProperty('--my', '-300px');
    });
  });

  // bounds: measured with transform removed, refreshed on resize
  function measure(){
    panels.forEach(p => {
      const t = p.el.style.transform;
      p.el.style.transform = 'none';
      const r = p.el.getBoundingClientRect();
      p.base = { l:r.left, t:r.top, rr:innerWidth - r.right, bb:innerHeight - r.bottom };
      p.el.style.transform = t;
      p.x = clampX(p, p.x); p.y = clampY(p, p.y);
    });
  }
  function clampX(p, x){
    if (!p.base) return x;
    const lo = -(p.base.l - M), hi = p.base.rr - M;
    return lo > hi ? (lo + hi) / 2 : Math.min(Math.max(x, lo), hi);
  }
  function clampY(p, y){
    if (!p.base) return y;
    const lo = -(p.base.t - M), hi = p.base.bb - M;
    return lo > hi ? (lo + hi) / 2 : Math.min(Math.max(y, lo), hi);
  }
  let rT; addEventListener('resize', () => { clearTimeout(rT); rT = setTimeout(measure, 120); });

  // reset: spring everything home
  document.getElementById('resetBtn').addEventListener('click', () => {
    panels.forEach(p => {
      if (REDUCED) { p.x = p.y = 0; p.vx = p.vy = 0; p.mode = 'idle'; }
      else { p.mode = 'spring'; }
    });
  });

  function tick(){
    for (const p of panels){
      if (p.mode === 'momentum'){
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.92; p.vy *= 0.92;
        const nx = clampX(p, p.x); if (nx !== p.x){ p.x = nx; p.vx *= -0.45; }  // edge bounce
        const ny = clampY(p, p.y); if (ny !== p.y){ p.y = ny; p.vy *= -0.45; }
        if (Math.abs(p.vx) < .08 && Math.abs(p.vy) < .08){ p.vx = p.vy = 0; p.mode = 'idle'; }
      } else if (p.mode === 'spring'){
        const k = .12, d = .78;
        p.vx = (p.vx + (-p.x) * k) * d;
        p.vy = (p.vy + (-p.y) * k) * d;
        p.x += p.vx; p.y += p.vy;
        if (Math.abs(p.x) < .4 && Math.abs(p.y) < .4 && Math.abs(p.vx) < .08 && Math.abs(p.vy) < .08){
          p.x = p.y = 0; p.vx = p.vy = 0; p.mode = 'idle'; p.wA = 0.035; p.wT = 0;
        }
      }
      // jelly wobble on release / landing
      let s = 1;
      if (p.wA > .002){ p.wT += 1/60; s = 1 + p.wA * Math.sin(p.wT * 26); p.wA *= .90; }
      p.el.style.transform = 'translate(' + p.x.toFixed(2) + 'px,' + p.y.toFixed(2) + 'px) scale(' + s.toFixed(4) + ')';
      // distortion surge ease
      if (Math.abs(p.scale - p.scaleT) > .5){
        p.scale += (p.scaleT - p.scale) * .14;
        p.disp.setAttribute('scale', p.scale.toFixed(1));
      }
      // light glide
      if (Math.abs(p.lx - p.ltx) > .6 || Math.abs(p.ly - p.lty) > .6){
        p.lx += (p.ltx - p.lx) * .2; p.ly += (p.lty - p.ly) * .2;
        p.light.setAttribute('x', p.lx.toFixed(1));
        p.light.setAttribute('y', p.ly.toFixed(1));
      }
    }
    requestAnimationFrame(tick);
  }

  measure();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
